<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giovanni Sambo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-85QGGEVQND"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-85QGGEVQND');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: pointer;
    }

    /* ── SLIDESHOW ── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .slide.active { opacity: 1; }

    /* dark overlay so text is always readable */
    .slideshow::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(8, 10, 14, 0.62);
      z-index: 1;
    }

    /* ── CONTENT ── */
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .quote {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 300;
      color: #e8e4dc;
      line-height: 1.6;
      max-width: 700px;
      letter-spacing: 0.01em;
    }

    .quote::before {
      content: '"';
      font-size: 1.3em;
      color: #c8a96e;
      font-family: 'Space Mono', monospace;
    }

    .quote::after {
      content: '"';
      font-size: 1.3em;
      color: #c8a96e;
      font-family: 'Space Mono', monospace;
    }

    .author {
      margin-top: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c8a96e;
    }

    .hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232, 228, 220, 0.4);
      z-index: 2;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* ── NAME (top left) ── */
    .name-tag {
      position: fixed;
      top: 2rem;
      left: 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c8a96e;
      z-index: 2;
    }

    /* dots indicator */
    .dots {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #c8a96e;
      opacity: 0.3;
      transition: opacity 0.4s;
    }

    .dot.active { opacity: 1; }
  </style>
</head>
<body onclick="window.location.href='index.html'">

  <!-- SLIDESHOW -->
  <div class="slideshow" id="slideshow">
    <div class="slide active" style="background-image: url('images/windtunnel-flettner.jpeg');"></div>
    <div class="slide" style="background-image: url('images/Pipistrel_flight.png');"></div>
    <div class="slide" style="background-image: url('images/CFD_front_wing.png');"></div>
    <div class="slide" style="background-image: url('images/bus-windtunnel.jpeg');"></div>
    <div class="slide" style="background-image: url('images/drone-maturita.jpeg');"></div>
  </div>

  <!-- NAME -->
  <div class="name-tag">G. Sambo</div>

  <!-- QUOTE -->
  <div class="content">
    <p class="quote">Cerco sempre di fare ciò che non sono capace di fare, per imparare come farlo.</p>
    <p class="author">— Pablo Picasso</p>
  </div>

  <!-- DOTS -->
  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- HINT -->
  <p class="hint">Click anywhere to enter</p>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function nextSlide() {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    setInterval(nextSlide, 4000);
  </script>

</body>
</html>
